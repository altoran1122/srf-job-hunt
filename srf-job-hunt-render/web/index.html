<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SRF Jobs</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <section id="loginScreen" class="login-screen">
      <form id="loginForm" class="login-card">
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true">SRF</div>
          <div>
            <h1>SRF Jobs</h1>
            <p>Finance intern & entry board</p>
          </div>
        </div>
        <label class="field">
          <span>이름</span>
          <input name="display_name" autocomplete="name" required placeholder="예: Minji" />
        </label>
        <label class="field">
          <span>공유 비밀번호</span>
          <input name="password" type="password" autocomplete="current-password" required />
        </label>
        <button class="button primary" type="submit">입장</button>
      </form>
    </section>

    <div id="appShell" class="app-shell hidden">
      <header class="app-header">
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true">SRF</div>
          <div>
            <h1>SRF Jobs</h1>
            <p>금융권 신입/인턴 큐레이션</p>
          </div>
        </div>
        <div class="header-actions">
          <span id="userBadge" class="user-badge"></span>
          <button id="settingsButton" class="icon-button" type="button" title="설정" aria-label="설정">⚙</button>
          <button id="logoutButton" class="button ghost" type="button">로그아웃</button>
        </div>
      </header>

      <main class="main">
        <section class="tool-panel">
          <div class="search-row">
            <label class="field search-field">
              <span>검색</span>
              <input id="searchInput" type="search" placeholder="회사, 직무, 태그, 출처" autocomplete="off" />
            </label>
            <label class="field compact">
              <span>정렬</span>
              <select id="sortSelect">
                <option value="deadline">마감일 빠른 순</option>
                <option value="latest">최근 등록 순</option>
                <option value="featured">추천 우선</option>
              </select>
            </label>
            <button id="refreshJobs" class="icon-button refresh-button" type="button" title="새로고침" aria-label="새로고침">↻</button>
          </div>

          <div class="filter-grid">
            <label class="field">
              <span>구분</span>
              <select id="levelFilter">
                <option value="all">전체</option>
                <option value="intern">인턴</option>
                <option value="entry">신입</option>
                <option value="unknown">확인 필요</option>
              </select>
            </label>
            <label class="field">
              <span>출처</span>
              <select id="sourceFilter">
                <option value="all">전체</option>
              </select>
            </label>
            <label class="field">
              <span>내 상태</span>
              <select id="statusFilter">
                <option value="all">전체</option>
                <option value="watching">관심</option>
                <option value="applied">지원완료</option>
              </select>
            </label>
            <label class="field">
              <span>보기</span>
              <select id="viewFilter">
                <option value="all">전체 공고</option>
                <option value="saved">내 관심</option>
                <option value="commented">내 코멘트</option>
                <option value="applied">지원완료</option>
              </select>
            </label>
          </div>

          <div class="quick-filters">
            <label class="toggle-row">
              <input id="deadlineOnly" type="checkbox" />
              <span>마감 임박만</span>
            </label>
            <label class="toggle-row">
              <input id="featuredOnly" type="checkbox" />
              <span>추천만</span>
            </label>
          </div>

          <div class="tag-section">
            <div class="section-label">태그</div>
            <div id="tagFilterList" class="tag-filter-list"></div>
          </div>

          <div class="source-actions">
            <button id="openAddDialog" class="button primary" type="button">직접 추가</button>
          </div>
        </section>

        <section class="metrics" aria-label="요약">
          <div>
            <span id="metricActive">0</span>
            <p>진행 중</p>
          </div>
          <div>
            <span id="metricSoon">0</span>
            <p>7일 내 마감</p>
          </div>
          <div>
            <span id="metricSaved">0</span>
            <p>내 관심</p>
          </div>
          <div>
            <span id="metricComments">0</span>
            <p>내 코멘트</p>
          </div>
        </section>

        <section class="list-pane">
          <div class="list-header">
            <span id="resultCount">0개 공고</span>
            <span id="syncState" role="status">대기 중</span>
          </div>
          <div id="jobList" class="job-list"></div>
        </section>
      </main>
    </div>

    <dialog id="jobDialog">
      <form id="jobForm" method="dialog" class="job-form">
        <div class="dialog-head">
          <h3>공고 추가</h3>
          <button class="icon-button" type="button" title="닫기" aria-label="닫기" data-close-dialog="jobDialog">×</button>
        </div>
        <div class="form-grid">
          <label class="field">
            <span>회사</span>
            <input name="company" required />
          </label>
          <label class="field">
            <span>공고명</span>
            <input name="title" required />
          </label>
          <label class="field">
            <span>구분</span>
            <select name="level">
              <option value="intern">인턴</option>
              <option value="entry">신입</option>
              <option value="unknown">확인 필요</option>
            </select>
          </label>
          <label class="field">
            <span>고용형태</span>
            <input name="employment_type" placeholder="인턴, 신입, 채용전환형 인턴" />
          </label>
          <label class="field">
            <span>지역</span>
            <input name="location" placeholder="서울" />
          </label>
          <label class="field">
            <span>마감일</span>
            <input name="deadline" placeholder="2026-06-14 또는 상시" />
          </label>
          <label class="field span-2">
            <span>원문 링크</span>
            <input name="source_url" type="url" required placeholder="https://..." />
          </label>
          <label class="field span-2">
            <span>태그</span>
            <input name="tags" placeholder="IB, 외국계, 리서치" />
          </label>
        </div>
        <div class="dialog-actions">
          <button class="button ghost" type="button" data-close-dialog="jobDialog">취소</button>
          <button class="button primary" id="submitJob" value="default" type="submit">추가</button>
        </div>
      </form>
    </dialog>

    <dialog id="settingsDialog">
      <form id="settingsForm" method="dialog" class="job-form">
        <div class="dialog-head">
          <h3>설정</h3>
          <button class="icon-button" type="button" title="닫기" aria-label="닫기" data-close-dialog="settingsDialog">×</button>
        </div>
        <div class="form-grid">
          <label class="field span-2">
            <span>공유 사람인 access-key</span>
            <input name="saramin_access_key" autocomplete="off" placeholder="운영자가 한 번만 저장하면 1시간마다 자동 수집됩니다" />
          </label>
          <label class="field span-2">
            <span>새 공유 비밀번호</span>
            <input name="new_password" type="password" autocomplete="new-password" placeholder="변경하지 않으려면 비워두세요" />
          </label>
        </div>
        <p id="settingsMeta" class="settings-meta"></p>
        <div class="dialog-actions">
          <button class="button ghost" type="button" data-close-dialog="settingsDialog">취소</button>
          <button class="button primary" id="saveSettings" value="default" type="submit">저장</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
</html>
